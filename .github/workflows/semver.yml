name: Release

on:
  push:
    branches:
      - main

permissions:
    contents: write
    checks: write
    id-token: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)
          echo "latest_tag=${LATEST_TAG:-v0.0.0}" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump
        run: |
          LATEST=${{ steps.get_tag.outputs.latest_tag }}
          MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)

          COMMITS=$(git log $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --pretty=format:"%s")

          if echo "$COMMITS" | grep -qE "^feat!|BREAKING CHANGE"; then
            NEW_TAG="v$((MAJOR + 1)).0.0"
          elif echo "$COMMITS" | grep -q "^feat"; then
            NEW_TAG="v${MAJOR}.$((MINOR + 1)).0"
          else
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "new_tag=${NEW_TAG}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)")
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Push tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.bump.outputs.new_tag }}
          git push origin ${{ steps.bump.outputs.new_tag }}

      - name: Create GitHub Release
        run: |
          gh release create ${{ steps.bump.outputs.new_tag }} \
            --title "${{ steps.bump.outputs.new_tag }}" \
            --notes "${{ steps.changelog.outputs.changelog }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}